name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # The repo intentionally contains only Dart sources; generate the
      # missing Android platform scaffolding for the build step.
      - name: Generate platform scaffolding
        run: flutter create . --platforms android --project-name personal_gym_progress_notebook

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug
