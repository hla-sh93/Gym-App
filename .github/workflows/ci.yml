name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Regenerate any platform files missing from the repo (gradle wrapper,
      # etc.), then drop the template test flutter create adds — it references
      # a MyApp class that does not exist in this app.
      - name: Generate platform scaffolding
        run: |
          flutter create . --platforms android --project-name personal_gym_progress_notebook
          rm -f test/widget_test.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gym-notebook-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
